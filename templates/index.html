{% extends "base.html" %}
{% block title %}3D Simulation{% endblock %}

{% block content %}
<!-- 3D canvas -->
<div id="canvas-container"></div>

<!-- Labels overlay (HTML) -->
<div id="labels-layer" aria-hidden="true"></div>

<!-- Control panel -->
<div id="controls">
  <h3>Controls</h3>

  <label for="dt-input">Date &amp; Time</label>
  <input type="datetime-local" id="dt-input" />

  <label for="speed-range">Animation speed</label>
  <input type="range" id="speed-range" min="0.1" max="365" step="0.1" value="1" />
  <div id="speed-label"></div>

  <div class="btn-row">
    <button id="btn-play">▶ Play</button>
    <button id="btn-now">Now</button>
  </div>
  <div class="btn-row">
    <button id="btn-labels">Labels</button>
    <button id="btn-orbits">Orbits</button>
  </div>
</div>

<!-- Hover info -->
<div id="planet-info"></div>
{% endblock %}

{% block head %}
<style>
  body { overflow: hidden; }
</style>
<script type="importmap">
{
  "imports": {
    "three": "{{ url_for('static', filename='vendor/three/build/three.module.js') }}",
    "three/controls/OrbitControls.js": "{{ url_for('static', filename='vendor/three/controls/OrbitControls.js') }}"
  }
}
</script>
<script type="module" src="{{ url_for('static', filename='js/simulation.js', v=static_version) }}"></script>
{% endblock %}
