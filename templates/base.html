<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Solar System – {% block title %}{% endblock %}</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}" />
  {% block head %}{% endblock %}
</head>
<body class="page">
  <nav>
    <a class="brand" href="/">☀ Solar System</a>
    <a href="/" {% if request.endpoint == 'index' %}class="active"{% endif %}>Simulation</a>
    <a href="/history" {% if request.endpoint == 'history' %}class="active"{% endif %}>History</a>
    <a href="/math" {% if request.endpoint == 'math' %}class="active"{% endif %}>Mathematics</a>
  </nav>
  {% block content %}{% endblock %}
</body>
</html>
